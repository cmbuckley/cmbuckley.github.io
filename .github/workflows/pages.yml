name: Deploy Jekyll site to Pages
on:
  workflow_dispatch:
  push:
    branches: main
  repository_dispatch:
    types: [pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages:
    uses: cmbuckley/.github/.github/workflows/pages.yml@main
    secrets: inherit
    with:
      environment_url: ${{ github.event.repository.homepage }}
